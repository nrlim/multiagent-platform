# ─────────────────────────────────────────────────────────────────────────────
# AgentHive — Production Docker Compose
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Required env vars (create .env.prod or pass as shell env):
#   GOOGLE_API_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY
#   POSTGRES_PASSWORD (default: agenthive_secret)
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agenthive-postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: agenthive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenthive_secret}
      POSTGRES_DB: agenthive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthive"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hive-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agenthive-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-agenthive_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-agenthive_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hive-network

  # ── Engine (FastAPI / Python) ─────────────────────────────────────────────
  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    container_name: agenthive-engine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ENGINE_HOST: "0.0.0.0"
      ENGINE_PORT: "8000"
      DASHBOARD_ORIGIN: "http://dashboard:3000"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-agenthive_redis}@redis:6379"
      DATABASE_URL: "postgresql://agenthive:${POSTGRES_PASSWORD:-agenthive_secret}@postgres:5432/agenthive"
      WORKSPACE_DIR: "/workspace"
      BUDGET_LIMIT: "${BUDGET_LIMIT:-2.0}"
      PROVIDER: "${PROVIDER:-google}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - workspace_data:/workspace
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - hive-network

  # ── Dashboard (Next.js) ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENGINE_URL: "http://engine:8000"
    container_name: agenthive-dashboard
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ENGINE_URL: "http://engine:8000"
      NEXT_PUBLIC_ENGINE_URL: "http://engine:8000"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - hive-network

# ── Shared Networks ───────────────────────────────────────────────────────────
networks:
  hive-network:
    driver: bridge

# ── Persistent Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  workspace_data:
    driver: local
